<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Read the latest news from Reuters, AP, BBC, and NPR in a simple, chronological feed. No opinions, no tracking, no engagement tricks. Just the straight news." />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clean Feed | Chronological News Without Algorithms" />
    <meta property="og:description" content="Read the latest news from Reuters, AP, BBC, and NPR in a simple, chronological feed. No opinions, no tracking, no engagement tricks. Just the straight news." />
    <meta property="og:url" content="https://thecleanfeed.app" />
    <meta property="og:site_name" content="Clean Feed" />
    <meta property="og:image" content="https://thecleanfeed.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://thecleanfeed.app/og-image.png" />
    <meta name="twitter:title" content="Clean Feed | Chronological News Without Algorithms" />
    <meta name="twitter:description" content="Read the latest news from Reuters, AP, BBC, and NPR in a simple, chronological feed. No opinions, no tracking, no engagement tricks." />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://thecleanfeed.app" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Clean Feed",
      "url": "https://thecleanfeed.app",
      "description": "A chronological news aggregator providing unbiased headlines from wire services like Reuters and AP without algorithmic manipulation.",
      "applicationCategory": "NewsApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": {
        "@type": "Organization",
        "name": "Clean Feed",
        "url": "https://thecleanfeed.app",
        "knowsAbout": ["Journalism", "Unbiased News", "Public Service"]
      }
    }
    </script>

    <link rel="manifest" href="/manifest.json" />
    <title>Clean Feed | Chronological News &amp; Unbiased Headlines (No Algorithms)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0d0d0d; color: #d4d4d4; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
