<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Clean Feed — News only. No opinions. No rage. No algorithms. Just headlines from Reuters, AP, BBC, and NPR in chronological order." />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clean Feed" />
    <meta property="og:description" content="No algorithms. No rage. Just news. Headlines from Reuters, AP, BBC, and NPR — chronologically sorted, opinion-free." />
    <meta property="og:url" content="https://cleanfeed.vercel.app" />
    <meta property="og:site_name" content="Clean Feed" />
    <meta property="og:image" content="https://cleanfeed.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://cleanfeed.vercel.app/og-image.png" />
    <meta name="twitter:title" content="Clean Feed" />
    <meta name="twitter:description" content="No algorithms. No rage. Just news. Headlines from Reuters, AP, BBC, and NPR — chronologically sorted, opinion-free." />

    <link rel="manifest" href="/manifest.json" />
    <title>Clean Feed</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0d0d0d; color: #d4d4d4; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
