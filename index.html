<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Free news without tracking, ads, or algorithms. Chronological headlines from Reuters, AP, BBC, NPR. No account needed. Privacy-focused news reader — the same unbiased feed for everyone." />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clean Feed — News with nothing else." />
    <meta property="og:description" content="Wire services, chronological order, no ads, no algorithm, no account. The same feed for everyone. Just the world, as it happened, in the order it happened." />
    <meta property="og:url" content="https://thecleanfeed.app" />
    <meta property="og:site_name" content="Clean Feed" />
    <meta property="og:image" content="https://thecleanfeed.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://thecleanfeed.app/og-image.png" />
    <meta name="twitter:title" content="Clean Feed — News with nothing else." />
    <meta name="twitter:description" content="Wire services, chronological order, no ads, no algorithm, no account. Just the world, as it happened." />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://thecleanfeed.app" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Clean Feed",
      "url": "https://thecleanfeed.app",
      "description": "A chronological news aggregator providing unbiased headlines from wire services like Reuters and AP without algorithmic manipulation.",
      "applicationCategory": "NewsApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": {
        "@type": "Organization",
        "name": "Clean Feed",
        "url": "https://thecleanfeed.app",
        "knowsAbout": ["Journalism", "Unbiased News", "Public Service"]
      }
    }
    </script>

    <link rel="manifest" href="/manifest.json" />
    <title>Clean Feed — News with nothing else.</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0d0d0d; color: #d4d4d4; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <noscript>
      <div style="max-width:720px;margin:0 auto;padding:40px 24px;font-family:Georgia,serif;color:#d4d4d4;background:#0d0d0d;">
        <h1 style="font-family:monospace;font-size:16px;letter-spacing:0.2em;margin-bottom:8px;">CLEAN FEED</h1>
        <p style="font-style:italic;color:#888;margin-bottom:24px;">No algorithms. No rage. Just news.</p>
        <h2 style="font-size:18px;margin-bottom:16px;">Chronological news from trusted sources</h2>
        <p style="line-height:1.6;margin-bottom:16px;">Clean Feed is a free news reader that shows headlines from Reuters, AP News, BBC, and NPR in chronological order. No algorithmic ranking, no opinions, no engagement tricks, no tracking.</p>
        <h3 style="font-size:14px;margin-bottom:8px;">Features</h3>
        <ul style="line-height:1.8;margin-bottom:16px;padding-left:20px;">
          <li>Live sports scores — NFL, NBA, MLB, NHL, NCAAM, EPL, F1, PGA</li>
          <li>Real-time market data — S&P 500, Dow, Nasdaq, VIX, Gold, Oil</li>
          <li>Financial indicators with plain-English context</li>
          <li>Local weather with 3-day forecast</li>
          <li>Local news for all 50 US states</li>
          <li>Entertainment, science, health, and tech news</li>
          <li>Daily digest — top stories covered by multiple sources</li>
          <li>This Day in History</li>
          <li>Dark and light mode</li>
          <li>Installable as a mobile app (PWA)</li>
        </ul>
        <h3 style="font-size:14px;margin-bottom:8px;">Sources</h3>
        <p style="line-height:1.6;margin-bottom:16px;">Reuters, AP News, BBC, NPR, Ars Technica, MIT Technology Review, Nature, Phys.org, STAT News, KFF Health News, FRED, SEC, BLS, U.S. Treasury, Federal Reserve.</p>
        <h3 style="font-size:14px;margin-bottom:8px;">Privacy</h3>
        <p style="line-height:1.6;margin-bottom:16px;">No accounts. No tracking. No cookies. No data sold. Your preferences are stored locally in your browser and never leave your device. Weather location data is sent only to the National Weather Service and is never stored on our servers.</p>
        <p style="color:#888;font-size:12px;">Enable JavaScript to use Clean Feed.</p>
      </div>
    </noscript>
  </body>
</html>
