<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}
h1 {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: #eee;
  margin-bottom: 12px;
}
.tagline {
  font-family: 'Newsreader', Georgia, serif;
  font-size: 24px;
  color: #888;
  font-style: italic;
  margin-bottom: 32px;
}
.divider {
  width: 60px;
  height: 2px;
  background: #FF8C00;
  margin-bottom: 32px;
}
.sources {
  font-size: 14px;
  color: #666;
  letter-spacing: 0.05em;
  text-align: center;
  line-height: 1.8;
}
.row1 { color: #888; }
.row2 { color: #555; font-size: 12px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Newsreader:ital@1&display=swap" rel="stylesheet">
</head>
<body>
  <h1>CLEAN FEED</h1>
  <p class="tagline">News with nothing else.</p>
  <div class="divider"></div>
  <div class="sources">
    <div class="row1">Reuters · AP News · BBC · NPR · The Hill · PBS · Bloomberg · CSM</div>
    <div class="row2">Deutsche Welle · France 24 · Ars Technica · MIT Tech Review · Nature · Phys.org + more</div>
  </div>
</body>
</html>
